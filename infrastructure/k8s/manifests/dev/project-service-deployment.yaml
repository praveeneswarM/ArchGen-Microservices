apiVersion: apps/v1
kind: Deployment
metadata:
  name: archgen-dev-project-service
  labels:
    app: project-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-service
  template:
    metadata:
      labels:
        app: project-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: archgen-dev-project-service-sa
      containers:
        - name: project-service
          image: "acrarchgendev.azurecr.io/project-service:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "archgen-dev-project-keyvault-provider"
