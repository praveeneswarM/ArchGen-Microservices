replicaCount: 1

image:
  repository: acrarchgendev.azurecr.io/api-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "azure-application-gateway"
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/rule-type: "path"
  hosts:
    - host: api-dev.archgen.com
      paths:
        - path: /api/
          pathType: Prefix

resources:
  limits:
    cpu: 150m
    memory: 256Mi
  requests:
    cpu: 75m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
