replicaCount: 1

image:
  repository: acrarchgendev.azurecr.io/architecture-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8003

resources:
  limits:
    cpu: 250m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

keyvault:
  enabled: true
  name: "kv-archgen-dev"
  clientId: "00000000-0000-0000-0000-000000000000"
  tenantId: "00000000-0000-0000-0000-000000000000"
  secrets:
    - name: "openai-api-key"
      alias: "OPENAI_API_KEY"
    - name: "deepseek-api-key"
      alias: "DEEPSEEK_API_KEY"

nodeSelector: {}
tolerations: []
affinity: {}
